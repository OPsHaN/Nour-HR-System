<div class="sticky-header">
  <button
    *ngIf="this.auth.isAdmin"
    pButton
    type="button"
    class="btn btn-sm mx-1 my-1 d-flex align-items-center justify-content-center gap-2"
    [class.btn-success]="!showCreateBank"
    [class.btn-danger]="showCreateBank"
    (click)="showCreateBank = !showCreateBank"
  >
    <i class="pi" [ngClass]="showCreateBank ? 'pi-times' : 'pi-building'"></i>

    {{ showCreateBank ? '' : 'بنك جديد' }}
  </button>
</div>

<!-- CREATE BANK -->
<app-create-bank *ngIf="showCreateBank" (created)="onBankCreated()">
</app-create-bank>

<!-- TABLE -->
<p-table
  *ngIf="!showCreateBank"
  [value]="Banks"
  [paginator]="true"
  [rows]="pageSize"
  [rowsPerPageOptions]="[5,10,20,50]"
  [loading]="loading"
  [lazy]="true"
  [totalRecords]="totalRecords"
  (onPage)="onPageChange($event)"
  [responsiveLayout]="'scroll'"
  [paginatorDropdownAppendTo]="'body'"
  dataKey="id"
  dir="rtl"
>
  <!-- HEADER -->
  <ng-template pTemplate="header">
    <tr>
      <th>#</th>
      <th>اسم البنك</th>
      <th>الإجراءات</th>
    </tr>
  </ng-template>

  <!-- BODY -->
  <ng-template pTemplate="body" let-bank let-ri="rowIndex">
    <tr>
      <!-- Row Number -->
      <td>{{ ri + 1 + (page - 1) * pageSize }}</td>

      <!-- Bank Name -->
      <td>{{ bank.name }}</td>

      <!-- Actions -->
      <td>
        <!-- Delete -->
        <button
          pButton
          type="button"
          class="btn btn-sm btn-danger mx-1 my-1 rounded-circle"
          (click)="confirmDelete(bank)"
        >
          <i
            class="pi pi-trash d-flex align-items-center justify-content-center"
          ></i>
        </button>
      </td>
    </tr>
  </ng-template>
  <ng-template pTemplate="emptymessage">
    <tr>
      <td colspan="3" class="text-center py-4">لاتوجد أى بيانات</td>
    </tr>
  </ng-template>
</p-table>
