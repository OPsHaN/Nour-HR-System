<div class="calendar-card">
  <div class="calendar-card__header">
    <button type="button" (click)="previousMonth()">&#8249;</button>
    <strong>{{ calendarTitle }}</strong>
    <button type="button" (click)="nextMonth()">&#8250;</button>
  </div>
  <div class="calendar-grid calendar-grid--weekdays">
    @for (weekday of weekdays; track weekday) {
      <span>{{ weekday }}</span>
    }
  </div>
  <div class="calendar-weeks">
    @for (week of calendarWeeks; track $index) {
      <div class="calendar-grid">
        @for (day of week; track $index) {
          <button
            type="button"
            class="calendar-day"
            [class.is-today]="day?.toDateString() === today().toDateString()"
            [disabled]="!day"
          >
            {{ day?.getDate() ?? '' }}
          </button>
        }
      </div>
    }
  </div>
  <div class="calendar-card__footer">
    <button type="button" (click)="resetCalendar()">Today</button>
    <button type="button" (click)="clearCalendarSelection()">Clear</button>
  </div>
</div>
