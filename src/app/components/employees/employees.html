<div class="sticky-header">
  <button
    pButton
    type="button"
    class="btn btn-sm btn-success mx-1 my-1 d-flex align-items-center justify-content-center gap-2"
    [class.btn-success]="!showCreateEmployee"
    [class.btn-secondary]="showCreateEmployee"
    icon="pi pi-plus"
    (click)="showCreateEmployee = !showCreateEmployee"
  >
  <i
    class="pi"
    [ngClass]="showCreateEmployee ? 'pi-arrow-right' : 'pi-user-plus'"
  ></i>

  {{ showCreateEmployee ? 'الرجوع للخلف' : 'موظف جديد' }}  </button>
</div>

<app-create-employee *ngIf="showCreateEmployee">
</app-create-employee>

<p-table
  *ngIf="!showCreateEmployee"
  [value]="employees"
  [paginator]="true"
  [rows]="pageSize"
  [rowsPerPageOptions]="[5,10,20]"
  [loading]="loading"
  [responsiveLayout]="'scroll'"
  [paginatorDropdownAppendTo]="'body'"
  dataKey="id"
  dir="rtl"
>
  <!-- HEADER -->
  <ng-template pTemplate="header">
    <tr>
      <th>#</th>
      <th>الاسم</th>
      <th>الوظيفة</th>
      <th>البنك</th>
      <th>رقم الحساب</th>
      <th>ساعات العمل</th>
      <th>الفرع</th>
      <th>الإجراءات</th>
    </tr>
  </ng-template>

  <!-- BODY -->
  <ng-template pTemplate="body" let-emp let-ri="rowIndex">
    <tr>
      <td>{{ ri + 1 + (page - 1) * pageSize }}</td>
      <td>{{ emp.name }}</td>
      <td>{{ emp.theNameOfJob }}</td>
      <td>{{ emp.bankName }}</td>
      <td>{{ emp.bankAccount }}</td>
      <td>{{ emp.shiftHours }}</td>
      <td>{{ emp.branchName }}</td>
      <td>
        <button
          pButton
          type="button"
          class="btn btn-sm btn-success mx-1 my-1"
          icon="pi pi-pencil"
          (click)="editEmployee(emp)"
        >
          <i class="pi pi-pencil"></i>
        </button>
        <button
          pButton
          type="button"
          class="btn btn-sm btn-danger mx-1 my-1"
          icon="pi pi-trash"
          (click)="confirmDelete(emp)"
        >
          <i class="pi pi-trash"></i>
        </button>
      </td>
    </tr>
  </ng-template>
</p-table>
