<div class="panel">
  <div class="form">

    <div class="field">
      <label>تاريخ الشيفت <span class="text-danger">*</span></label>
      <p-datepicker
        [(ngModel)]="form.shiftDate"
        dateFormat="yy-mm-dd"
        placeholder="اختر تاريخ"
        [appendTo]="'body'"
        [pt]="{ pcInputText: { root: { style: 'padding: 0.3rem' } } }"
      />
    </div>

    <div class="field">
      <label>السبب <span class="text-danger">*</span></label>
      <input class="custom-input" type="text" [(ngModel)]="form.reason" placeholder="مثال: انقطاع الكهرباء" />
    </div>

    <div class="field">
      <label>ملاحظات</label>
      <textarea class="custom-input" [(ngModel)]="form.notes" rows="3" placeholder="أي تفاصيل إضافية..."></textarea>
    </div>

    <button
      type="button"
      class="submit-btn full"
      [disabled]="loading || !form.reason || !form.shiftDate"
      (click)="submit()"
    >
      {{ loading ? 'جارى الإرسال...' : 'إرسال الطلب' }}
    </button>

  </div>
</div>
