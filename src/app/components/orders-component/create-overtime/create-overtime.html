<div class="panel">
  <div class="form">

    <div class="field">
      <label>عدد الساعات <span class="text-danger">*</span></label>
      <input
        class="custom-input"
        type="number"
        [(ngModel)]="form.hours"
        placeholder="مثال: 2"
        min="1"
      />
    </div>

    <div class="field">
      <label>ملاحظات</label>
      <textarea
        class="custom-input"
        [(ngModel)]="form.notes"
        rows="3"
        placeholder="مثال: زميلي تأخر في الاستلام..."
      ></textarea>
    </div>

    <button
      type="button"
      class="submit-btn full"
      [disabled]="loading || !form.hours || form.hours < 1"
      (click)="submit()"
    >
      {{ loading ? 'جارى الإرسال...' : 'إرسال الطلب' }}
    </button>

  </div>
</div>
