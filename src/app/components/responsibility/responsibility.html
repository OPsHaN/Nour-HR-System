<div class="sticky-header my-2">
<button
  pButton
  type="button"
  class="btn btn-sm mx-1 my-1 d-flex align-items-center justify-content-center gap-2"
  [class.btn-success]="!showCreateResponsibility"
  [class.btn-danger]="showCreateResponsibility"
  (click)="showCreateResponsibility = !showCreateResponsibility"
>
  <i
    class="pi"
    [ngClass]="showCreateResponsibility   ? 'pi-times' : 'pi-sitemap'"
  ></i>
  {{ showCreateResponsibility ? '' : 'عهدة جديدة' }}
</button>
</div>

<!-- CREATE RESPONSIBILITY -->
<app-create-responsibility *ngIf="showCreateResponsibility" (created)="onResponsibilityCreated()"
>
</app-create-responsibility>

<!-- TABLE -->
<p-table
  *ngIf="!showCreateResponsibility"
  [value]="Responsibilities"
  [paginator]="true"
  [rows]="pageSize"
  [rowsPerPageOptions]="[5,10,20]"
  [loading]="loading"
  [responsiveLayout]="'scroll'"
  [paginatorDropdownAppendTo]="'body'"
  dataKey="id"
  dir="rtl"
>
  <!-- HEADER -->
<ng-template pTemplate="header">
  <tr>
    <th>#</th>
    <th>اسم العهدة</th>
    <th>تاريخ الإضافة</th>
    <!-- <th>الإجراءات</th> -->
  </tr>
</ng-template>

<ng-template pTemplate="body" let-responsibility let-ri="rowIndex">
  <tr>
    <td>{{ ri + 1 + (page - 1) * pageSize }}</td>
    <td>{{ responsibility.name }}</td>
    <td>{{ responsibility.createdAt | date:'yyyy-MM-dd' }}</td>
    <!-- <td>
      <button
        pButton
        type="button"
        class="btn btn-sm btn-danger mx-1 my-1 rounded-circle"
        (click)="confirmDelete(responsibility)"
      >
        <i class="pi pi-trash d-flex align-items-center justify-content-center"></i>
      </button>
    </td> -->
  </tr>
</ng-template>

<ng-template pTemplate="emptymessage">
  <tr>
    <td colspan="4" class="text-center py-4">لاتوجد أى بيانات</td>
  </tr>
</ng-template>

</p-table>
