<div class="sticky-header">
  <button
    pButton
    type="button"
    class="btn btn-sm btn-success mx-1 my-1 d-flex align-items-center justify-content-center gap-2"
    [class.btn-success]="!showCreateUser"
    [class.btn-danger]="showCreateUser"
    icon="pi pi-plus"
    (click)="showCreateUser = !showCreateUser"
  >
    <i
      class="pi"
      [ngClass]="showCreateUser ? 'pi pi-times ' : 'pi-user-plus'"
    ></i>

    {{ showCreateUser ? '' : 'مستخدم جديد' }}
  </button>
</div>

<app-create-user *ngIf="showCreateUser" (created)="onEmployeeCreated()">
</app-create-user>

<p-table
  *ngIf="!showCreateUser"
  [value]="users"
  dataKey="id"
  editMode="row"
  [paginator]="true"
  [lazy]="true"
  [totalRecords]="totalRecords"
  [rows]="pageSize"
  [rowsPerPageOptions]="[5,10,20]"
  [paginatorDropdownAppendTo]="'body'"
  [editingRowKeys]="editingRowKeys"
  (onLazyLoad)="onPageChange($event)"
  dir="rtl"
>
  <!-- HEADER -->
  <ng-template pTemplate="header">
    <tr>
      <th>#</th>
      <th>إسم الموظف</th>
      <th>إسم المستخدم</th>
      <th>كلمة المرور</th>
      <th>المنصب</th>
      <th>الحالة</th>
      <th>الإجراءات</th>
    </tr>
  </ng-template>

  <!-- BODY -->
  <ng-template pTemplate="body" let-emp let-editing="editing" let-ri="rowIndex">
    <tr [pEditableRow]="emp">
      <td>{{ ri + 1 }}</td>

      <!-- NAME -->
      <td>
        <p-cellEditor>
          <ng-template pTemplate="input">
            <input
              pInputText
              class="custom-input"
              disabled
              [(ngModel)]="emp.name"
            />
          </ng-template>
          <ng-template pTemplate="output"> {{ emp.name }} </ng-template>
        </p-cellEditor>
      </td>

      <!-- USERNAME -->
      <td>
        <p-cellEditor>
          <ng-template pTemplate="input">
            <input
              pInputText
              class="custom-input"
              disabled
              [(ngModel)]="emp.username"
            />
          </ng-template>
          <ng-template pTemplate="output"> {{ emp.username }} </ng-template>
        </p-cellEditor>
      </td>

      <!-- PASSWORD -->
      <td>
        <p-cellEditor>
          <ng-template pTemplate="input">
            <div class="input-wrapper">
              <input
                pInputText
                class="custom-input"
                [type]="emp.showPassword ? 'text' : 'password'"
                [(ngModel)]="emp.password"
                [ngModelOptions]="{ standalone: true }"
                placeholder="رقم سرى جديد"
              />

              <i
                class="pi password-eye"
                [ngClass]="emp.showPassword ? 'pi-eye-slash' : 'pi-eye'"
                (click)="emp.showPassword = !emp.showPassword"
              ></i>
            </div>
          </ng-template>

          <ng-template pTemplate="output"> ******** </ng-template>
        </p-cellEditor>
      </td>

      <!-- ROLE -->
      <td>
        <p-cellEditor>
          <ng-template pTemplate="input">
            <select [(ngModel)]="emp.role" disabled class="custom-input">
              <option value="">اختر المنصب</option>
              <option value="Admin">مسؤل</option>
              <option value="Accountant">محاسب</option>
              <option value="HR">موارد بشرية</option>
              <option value="Employee">موظف</option>
              <option value="Manager">مدير</option>
              <option value="Control">كنترول</option>
              <option value="Area Manager">مدير منطقة</option>
            </select>
          </ng-template>
          <ng-template pTemplate="output"> {{ emp.role }} </ng-template>
        </p-cellEditor>
      </td>

      <!-- STATUS -->
      <td>
        <p-cellEditor>
          <ng-template pTemplate="input">
            <select
              [(ngModel)]="emp.isActive"
              (ngModelChange)="onStatusChange(emp)"
              class="custom-input"
            >
              <option [ngValue]="true">نشيط</option>
              <option [ngValue]="false">غير نشيط</option>
            </select>
          </ng-template>

          <ng-template pTemplate="output">
            <p-tag
              [value]="emp.isActive ? 'نشيط' : 'غير نشيط'"
              [severity]="emp.isActive ? 'success' : 'danger'"
            >
            </p-tag>
          </ng-template>
        </p-cellEditor>
      </td>

      <!-- ACTIONS -->
      <td>
        <!-- Edit -->
        <button
          *ngIf="!editing"
          pButton
          icon="pi pi-pencil"
          class="btn btn-sm btn-success mx-1 my-1 rounded-circle"
          (click)="editingRowKeys[emp.id] = true"
          pInitEditableRow
        >
          <i
            class="pi pi-pencil d-flex align-items-center justify-content-center"
          ></i>
        </button>

        <!-- Show -->

        <button
          *ngIf=" emp.role === 'AreaManager'"
          pButton
          class="btn btn-sm btn-info mx-1 my-1 rounded-circle"
          (click)="openBranchesDialog(emp)"
        >
          <i
            class="pi pi-building d-flex align-items-center justify-content-center"
          ></i>
        </button>

        <!-- Save -->
        <button
          *ngIf="editing"
          pButton
          icon="pi pi-check"
          class="btn btn-sm btn-success mx-1 my-1 rounded-circle"
          (click)="onRowEditSave(emp)"
        >
          <i
            class="pi pi-check d-flex align-items-center justify-content-center"
          ></i>
        </button>

        <!-- Cancel -->
        <button
          *ngIf="editing"
          pButton
          icon="pi pi-times"
          class="btn btn-sm btn-danger mx-1 my-1 rounded-circle"
          pCancelEditableRow
        >
          <i
            class="pi pi-times d-flex align-items-center justify-content-center"
          ></i>
        </button>

        <!-- Delete -->
        <!-- <button
          *ngIf="!editing"
          pButton
          icon="pi pi-trash"
          class="btn btn-sm btn-danger mx-1 my-1 rounded-circle"
          (click)="confirmDelete(emp)"
        >
          <i
            class="pi pi-trash d-flex align-items-center justify-content-center"
          ></i>
        </button> -->
      </td>
    </tr>
  </ng-template>
  <ng-template pTemplate="emptymessage">
    <tr>
      <td colspan="7" class="text-center py-4">لاتوجد أى بيانات</td>
    </tr>
  </ng-template>
</p-table>

<p-dialog
  header="فروع المدير: {{ selectedManager?.name }}"
  [(visible)]="branchesDialogVisible"
  [modal]="true"
  [style]="{ width: '650px' }"
  [draggable]="false"
  styleClass="branches-dialog"
  dir="rtl"
>
  <div *ngIf="loadingBranches" class="text-center py-3">جاري التحميل...</div>

  <div *ngIf="!loadingBranches">
    <label class="d-block mb-2">الفروع:</label>
    <p-multiSelect
      class="custom w-100"
      [options]="allBranches"
      [(ngModel)]="selectedBranchIds"
      optionLabel="name"
      optionValue="id"
      placeholder="اختر الفروع"
      display="chip"
    ></p-multiSelect>
    <!-- 👇 عرض الفروع المختارة تحت -->

    <div
      class="selected-branches mt-3 d-flex flex-wrap gap-2"
      *ngIf="selectedBranchIds.length > 0"
    >
      <p-chip
        *ngFor="let branchId of selectedBranchIds"
        [label]="getBranchName(branchId)"
        [removable]="true"
        (onRemove)="removeBranchChip(branchId)"
      ></p-chip>
    </div>
  </div>

  <div class="form">
    <button
      type="button"
      class="submit-btn full mt-5"
      [disabled]="loadingBranches || savingBranches"
      (click)="saveBranches()"
    >
      حفظ الفروع
    </button>
  </div>
</p-dialog>
